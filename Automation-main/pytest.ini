[pytest]
testpaths = tests
addopts =
    --browser=chromium
    --headed
    --html=reports/report.html
    --self-contained-html
    --video=on
    --output=artifacts
    -m "not stress"
markers =
    stress: opt-in stress / flake-detection tests. Excluded from the default
        run (pytest excludes them via `-m "not stress"` above). Run them
        explicitly with: pytest -m stress
slowmo = 200
